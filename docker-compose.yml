services:
  db:
    image: postgres:16-alpine
    container_name: mission_critical_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-app}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-app}"]
      interval: 10s
      timeout: 5s
      retries: 5

  ntfy:
    image: binwiederhier/ntfy:latest
    container_name: mission_critical_ntfy
    restart: unless-stopped
    command: ["serve"]
    ports:
      - "8082:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 http://localhost:80/v1/health -O - | grep -Eo '\"healthy\"\\s*:\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  backend:
    build:
      context: ./ixian-mission-critical-backend
      dockerfile: dockerfile
    container_name: mission_critical_api
    restart: unless-stopped
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-app}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DEBUG: ${DEBUG:-true}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:3000,http://localhost:5173,http://localhost:4173}
      NTFY_URL: ${NTFY_URL:-http://ntfy:80}
      NTFY_TOPIC: ${NTFY_TOPIC:-ixian-mission-critical}
    depends_on:
      db:
        condition: service_healthy
      ntfy:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./ixian-mission-critical
      dockerfile: Dockerfile
      args:
        NODE_MEMORY_MB: ${NODE_MEMORY_MB:-2048}
    container_name: mission_critical_web
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "3000:80"

volumes:
  postgres_data:
